name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve FoxSecura Anti-Spam.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      render: typescript
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Node.js, discord.js, operating system
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed secrets and sensitive identifiers.
          required: true
        - label: This is not a security vulnerability.
          required: true
